
name: Daily AI Paper Digest

on:
  schedule:
    # 设置为每天 UTC 时间 00:00 运行（对应北京时间早上 08:00）
    - cron: '0 0 * * *'
  # 允许手动触发，方便测试
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run script
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: python get_papers.py

    - name: Send mail
      uses: dawidd6/action-send-mail@v3
      with:
        # SMTP 服务器地址 (QQ用 smtp.qq.com, Gmail用 smtp.gmail.com)
        server_address: smtp.qq.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "📅 ArXiv 论文日报 - ${{ bytes_to_human_readable(job.status) }} ${{ github.event.repository.updated_at }}"
        to: ${{ secrets.MAIL_RECEIVER }}
        from: "ArXiv Bot"
        # 发送刚才生成的 report.md 内容
        html_body: file://report.md
        convert_markdown: true
